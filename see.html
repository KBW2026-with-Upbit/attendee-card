  :root{--dark:#0A1019;--line:#1e2a3d;--white:#F4FBFD;--muted:#8ea0b8;--blue:#1865FF;--soft-blue:#AEE9FF;--yellow:#FFFF98;--orange:#FF9812;--red:#FF4D00;
    --font:'Neue Montreal',Helvetica,Arial,sans-serif;--mono:'Neue Montreal',Helvetica,Arial,sans-serif;}
  *{box-sizing:border-box}html,body{margin:0}
  body{background:radial-gradient(1100px 600px at 82% -8%,#10203f 0%,transparent 55%),radial-gradient(900px 500px at -5% 108%,#0d1b3a 0%,transparent 55%),var(--dark);
    color:var(--white);font-family:var(--font);-webkit-font-smoothing:antialiased;min-height:100vh;padding:32px 24px 56px;}
  .wrap{max-width:1120px;margin:0 auto}
  .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--soft-blue);display:inline-flex;align-items:center;gap:10px;white-space:nowrap}
  @media(max-width:480px){.eyebrow{font-size:10.5px;letter-spacing:.06em;gap:7px}}
  .eyebrow::before{content:"";width:22px;height:22px;background:var(--yellow);clip-path:polygon(26% 0,100% 0,74% 100%,0 100%);display:inline-block}
  h1{font-size:34px;line-height:1.05;font-weight:700;margin:14px 0 8px;letter-spacing:-.01em}h1 span{color:var(--blue)}
  .lead{font-size:16px;line-height:1.5;font-weight:400;color:#c3d1e2;margin:10px 0 4px;max-width:60ch}
  .sub{color:var(--muted);margin:0 0 28px;font-size:15px;max-width:56ch}
  .app{display:grid;grid-template-columns:minmax(0,380px) minmax(0,1fr);gap:28px;align-items:start}
  @media(max-width:860px){.app{grid-template-columns:1fr;gap:16px}.preview{order:-1;position:sticky;top:0;z-index:5;background:var(--dark);padding:10px 0 12px;margin-top:-4px}.stage{padding:12px}}
  .controls{display:flex;flex-direction:column;gap:16px}
  label.fld{display:block;font-size:12px;letter-spacing:.04em;color:var(--muted);margin:0 0 6px;text-transform:uppercase;font-family:var(--mono)}
  input[type=text]{width:100%;background:#0c141f;border:1px solid var(--line);color:var(--white);border-radius:10px;padding:12px 13px;font-family:var(--font);font-size:15px;outline:none;transition:border-color .15s}
  input[type=text]:focus{border-color:var(--blue)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .drop{border:1.5px dashed #2b3b55;border-radius:14px;padding:18px;text-align:center;cursor:pointer;background:#0c141f;transition:.15s;display:flex;flex-direction:column;align-items:center;gap:6px}
  .drop:hover,.drop.hot{border-color:var(--yellow);background:#0f1826}
  .vh{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);border:0;opacity:0}
  .drop:focus-within{border-color:var(--blue);box-shadow:0 0 0 3px rgba(24,101,255,.35)}
  .drop .ic{width:38px;height:38px;background:var(--yellow);border-radius:9px;clip-path:polygon(26% 0,100% 0,74% 100%,0 100%);margin-bottom:2px}
  .drop b{font-size:14px}.drop small{color:var(--muted);font-size:12px}
  .drop.has{border-style:solid;border-color:#2b3b55}.drop.has .ic{background:var(--soft-blue)}
  .adjust{background:#0c141f;border:1px solid var(--line);border-radius:12px;padding:14px;display:none}
  .adjust.show{display:block}
  .chk{display:flex;align-items:center;gap:9px;font-size:13.5px;cursor:pointer;user-select:none;margin-bottom:12px}
  .chk input{width:17px;height:17px;accent-color:var(--blue);cursor:pointer}
  .adjust .hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .adjust .hd span{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  .adjust .reset{background:none;border:0;color:var(--soft-blue);font-family:var(--font);font-size:12px;cursor:pointer;padding:0}
  input[type=range]{width:100%;accent-color:var(--blue);height:22px}
  .adjust .tip{font-size:11.5px;color:var(--muted);margin:8px 0 0}
  .seg{display:flex;background:#0c141f;border:1px solid var(--line);border-radius:11px;padding:4px;gap:4px}
  .seg button{flex:1;border:0;background:transparent;color:var(--muted);padding:10px;border-radius:8px;font-family:var(--font);font-weight:600;font-size:13px;cursor:pointer;transition:.15s}
  .seg button.on{background:var(--blue);color:#fff}
  .tags{display:grid;grid-template-columns:1fr;gap:10px}
  .tags .swatch{display:flex;align-items:center;gap:8px}
  .tags .dot{width:12px;height:12px;border-radius:3px;flex:0 0 auto}
  .sec{border-top:1px solid var(--line);padding-top:16px;margin-top:2px}
  .actions{display:grid;grid-template-columns:1fr;gap:12px;margin-top:2px}
  .btn{border:0;border-radius:11px;padding:13px;font-family:var(--font);font-weight:700;font-size:14px;cursor:pointer;transition:.15s}
  .btn.primary{background:var(--yellow);color:#0A1019}.btn.primary:hover{filter:brightness(1.06)}
  .btn.ghost{background:transparent;color:var(--white);border:1px solid var(--line)}.btn.ghost:hover{border-color:var(--blue)}
  .btn.primary.off{background:#242b35;color:#5f7085;cursor:not-allowed}.btn.primary.off:hover{filter:none}
  input[type=text].miss{border-color:#ff5a5f}.drop.miss{border-color:#ff5a5f;background:#1a1013}
  #reqHint{display:none;color:#ff8a8d;font-size:12.5px;line-height:1.5;margin:8px 0 0;text-align:center}

  .busy{position:absolute;inset:0;display:none;align-items:center;justify-content:center;gap:10px;background:rgba(10,16,25,.62);color:var(--white);font-weight:600;font-size:14px;border-radius:16px;z-index:2}
  .busy.show{display:flex}
  .busy .spin{width:16px;height:16px;border:2px solid rgba(244,251,253,.35);border-top-color:var(--white);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  canvas{max-width:100%;max-height:76vh;height:auto;width:auto;border-radius:10px;display:block;box-shadow:0 20px 60px -20px #000;touch-action:none}
  canvas.grab{cursor:grab}canvas.grabbing{cursor:grabbing}
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">Sep 29–Oct 1 · Walkerhill</div>
  <h1>KBW2026 <span>Attendee</span> Card Maker</h1>
  <p class="lead">Create your KBW2026 Attendee Card.<br>Upload your photo, enter your details, choose a frame, and download it to share.</p>
  <p class="sub" style="font-style:italic;margin-top:6px">* Everything runs locally in your browser. Your data is never uploaded.</p>
  <div class="app">
    <section class="controls">
      <label class="drop" id="drop">
        <span class="ic"></span><b id="dropTitle">Add your photo</b>
        <small id="dropSub">Click or drop an image.<br>For best results, use a headshot with a clear background.</small>
        <input id="file" type="file" accept="image/*" class="vh">
      </label>
      <div class="adjust" id="adjust">
        <label class="chk"><input type="checkbox" id="rmbg" checked> Pop out of the frame <span style="color:#6b7d96">(cuts out background)</span></label>
        <div class="hd"><span>Frame the photo</span><button class="reset" id="reset">Reset</button></div>
        <label class="fld" style="margin:2px 0 6px">Zoom</label>
        <input type="range" id="zoom" min="40" max="320" value="100">
        <label class="fld" style="margin:12px 0 6px">Move left / right</label>
        <input type="range" id="posx" min="-700" max="700" value="0">
        <label class="fld" style="margin:12px 0 6px">Move up / down</label>
        <input type="range" id="posy" min="-700" max="700" value="0">
      </div>
      <div class="row2">
        <div><label class="fld">First name</label><input id="fn" type="text" placeholder="First"></div>
        <div><label class="fld">Last name</label><input id="ln" type="text" placeholder="Last"></div>
      </div>
      <div><label class="fld">Title / Role</label><input id="tr" type="text" placeholder="Co-Founder"></div>
      <div><label class="fld">Company</label><input id="co" type="text" placeholder="Blockchain Company"></div>
      <div class="sec">
        <label class="fld">Interests <span style="text-transform:none;letter-spacing:0">(up to 3 — leave blank to hide)</span></label>
        <div class="tags">
          <div class="swatch"><span class="dot" style="background:#FF9812"></span><input id="t0" type="text" value="RWA" placeholder="e.g. RWA"></div>
          <div class="swatch"><span class="dot" style="background:#1865FF"></span><input id="t1" type="text" value="STO" placeholder="e.g. STO"></div>
          <div class="swatch"><span class="dot" style="background:#FF4D00"></span><input id="t2" type="text" value="Stable" placeholder="e.g. Stable"></div>
        </div>
      </div>
      <div class="actions">
        <button class="btn primary" id="dl1">Download</button>
        <button class="btn ghost" id="shareX">𝕏&nbsp;&nbsp;Share on X</button>
      </div>
      <p id="reqHint"></p>
    </section>
    <section class="preview">
      <div class="seg" id="seg" style="max-width:340px;margin:0 auto 14px"><button data-f="1x1" class="on">Feed · 1:1</button><button data-f="9x16">Story · 9:16</button></div>
      <div class="stage"><canvas id="cv" width="1200" height="1200" class="grab"></canvas><div class="busy" id="busy"><span class="spin"></span><span id="busyTxt">Removing background…</span></div></div>
    </section>
  </div>
</div>
<script>
const CFG={
 '1x1':{w:1200,h:1200,tpl:'_see1x1.png',mask:'_seemask_1x1.png',
   ph:[55,367,611,848], popClip:[55,232,556,616], photoHint:{x:333,y:600,size:34},
   name:{x:60,l1:954,l2:1026,size:58,max:545},
   title:{x:60,base:1090,size:31,max:545},
   company:{x:60,base:1135,size:31,max:545},
   nameCover:[38,896,568,258],
   tags:[[24,258,'#FF9812'],[584,470,'#1865FF'],[24,692,'#FF4D00']], tagH:70},
 '9x16':{w:900,h:1600,tpl:'_see9x16.png',mask:'_seemask_9x16.png',
   ph:[52,620,515,1020], popClip:[52,500,463,520], photoHint:{x:283,y:830,size:32},
   name:{x:56,l1:1109,l2:1169,size:50,max:405},
   title:{x:56,base:1222,size:28,max:405},
   company:{x:56,base:1259,size:28,max:405},
   nameCover:[36,1064,430,212],
   tags:[[39,519,'#FF9812'],[520,701,'#1865FF'],[34,893,'#FF4D00']], tagH:60}};
const BLACK='#0A1019',BLUE='#1865FF',CARDBG='#F4FBFD';
const FONT="'Neue Montreal',Helvetica,Arial,sans-serif";
const tpl={}, mask={};
for(const k in CFG){const t=new Image();t.onload=render;t.src=CFG[k].tpl;tpl[k]=t;const m=new Image();m.onload=render;m.src=CFG[k].mask;mask[k]=m;}
const state={photo:null,gray:null,fn:'',ln:'',tr:'',co:'',fmt:'1x1',scale:1,px:0,py:0,removeBg:true,hasAlpha:false,tags:['RWA','STO','Stable']};

function hasTransparency(img){try{const c=document.createElement('canvas');const s=Math.min(1,120/Math.max(img.naturalWidth||img.width,img.naturalHeight||img.height));
  c.width=Math.max(1,Math.round((img.naturalWidth||img.width)*s));c.height=Math.max(1,Math.round((img.naturalHeight||img.height)*s));
  const g=c.getContext('2d',{willReadFrequently:true});g.drawImage(img,0,0,c.width,c.height);
  const d=g.getImageData(0,0,c.width,c.height).data;let clear=0;for(let i=3;i<d.length;i+=4){if(d[i]<245)clear++;}
  return clear>d.length/4*0.02;}catch(e){return false;}}
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
function analyzeBorder(d,W,H){let lum=0,sat=0,n=0,rs=[],gs=[],bs=[];const idx=(x,y)=>(y*W+x)*4;
  const add=(x,y)=>{const i=idx(x,y),r=d[i],g=d[i+1],b=d[i+2];lum+=0.299*r+0.587*g+0.114*b;sat+=Math.max(r,g,b)-Math.min(r,g,b);rs.push(r);gs.push(g);bs.push(b);n++;};
  const sx=Math.max(1,W>>7),sy=Math.max(1,H>>7);for(let x=0;x<W;x+=sx){add(x,0);add(x,H-1);}for(let y=0;y<H;y+=sy){add(0,y);add(W-1,y);}
  lum/=n;sat/=n;const mean=a=>a.reduce((s,v)=>s+v,0)/a.length;const varc=a=>{const m=mean(a);return a.reduce((s,v)=>s+(v-m)*(v-m),0)/a.length;};
  return{light:lum>185&&sat<58,uniform:(varc(rs)+varc(gs)+varc(bs))/3<700,br:Math.round(mean(rs)),bgc:Math.round(mean(gs)),bb:Math.round(mean(bs))};}
function removeBgFlood(d,W,H,a){let mode=a.light?'light':(a.uniform?'uniform':'color');
  const isBg=i=>{const r=d[i],g=d[i+1],b=d[i+2];if(mode==='light'){const L=0.299*r+0.587*g+0.114*b,S=Math.max(r,g,b)-Math.min(r,g,b);return L>165&&S<70;}return (Math.abs(r-a.br)+Math.abs(g-a.bgc)+Math.abs(b-a.bb))<100;};
  const seen=new Uint8Array(W*H),st=[];for(let x=0;x<W;x++){st.push(x,0,x,H-1);}for(let y=0;y<H;y++){st.push(0,y,W-1,y);}
  while(st.length){const y=st.pop(),x=st.pop();if(x<0||y<0||x>=W||y>=H)continue;const p=y*W+x;if(seen[p])continue;const i=p*4;if(!isBg(i))continue;seen[p]=1;d[i+3]=0;st.push(x+1,y,x-1,y,x,y+1,x,y-1);}}
function bbox(d,W,H){let x1=W,y1=H,x2=-1,y2=-1;for(let y=0;y<H;y++)for(let x=0;x<W;x++){if(d[(y*W+x)*4+3]>24){if(x<x1)x1=x;if(x>x2)x2=x;if(y<y1)y1=y;if(y>y2)y2=y;}}
  if(x2<0)return null;const px=Math.round((x2-x1)*0.05),py=Math.round((y2-y1)*0.05);return{x1:Math.max(0,x1-px),y1:Math.max(0,y1-py),x2:Math.min(W-1,x2+px),y2:Math.min(H-1,y2+py)};}
let _imgly=null;function getImgly(){if(!_imgly)_imgly=import('https://esm.sh/@imgly/background-removal@1.7.0').catch(e=>{_imgly=null;throw e;});return _imgly;}
async function removeBgImgly(img,onProgress){const {removeBackground}=await getImgly();const maxD=1600;let W=img.naturalWidth||img.width,H=img.naturalHeight||img.height;
  const sc=Math.min(1,maxD/Math.max(W,H));W=Math.round(W*sc);H=Math.round(H*sc);const tc=document.createElement('canvas');tc.width=W;tc.height=H;tc.getContext('2d').drawImage(img,0,0,W,H);
  const srcBlob=await new Promise(r=>tc.toBlob(r,'image/png'));const outBlob=await removeBackground(srcBlob,{output:{format:'image/png'},progress:onProgress});const url=URL.createObjectURL(outBlob);
  try{const im=await new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=rej;i.src=url;});const c=document.createElement('canvas');c.width=im.naturalWidth;c.height=im.naturalHeight;c.getContext('2d').drawImage(im,0,0);return c;}finally{URL.revokeObjectURL(url);}}
function cropAlpha(c){const W=c.width,H=c.height,g=c.getContext('2d',{willReadFrequently:true});const bb=bbox(g.getImageData(0,0,W,H).data,W,H);if(!bb)return c;
  const cw=bb.x2-bb.x1+1,ch=bb.y2-bb.y1+1,cc=document.createElement('canvas');cc.width=cw;cc.height=ch;cc.getContext('2d').drawImage(c,bb.x1,bb.y1,cw,ch,0,0,cw,ch);return cc;}
function floodFallback(c,g,W,H){const im=g.getImageData(0,0,W,H),a=analyzeBorder(im.data,W,H);removeBgFlood(im.data,W,H,a);g.putImageData(im,0,0);return cropAlpha(c);}
async function process(img,onProgress){if(!state.removeBg){const maxD=1400;let W=img.naturalWidth||img.width,H=img.naturalHeight||img.height;const sc=Math.min(1,maxD/Math.max(W,H));W=Math.round(W*sc);H=Math.round(H*sc);const c=document.createElement('canvas');c.width=W;c.height=H;c.getContext('2d').drawImage(img,0,0,W,H);return c;}
  try{return cropAlpha(await removeBgImgly(img,onProgress));}catch(e){const maxD=1400;let W=img.naturalWidth||img.width,H=img.naturalHeight||img.height;const sc=Math.min(1,maxD/Math.max(W,H));W=Math.round(W*sc);H=Math.round(H*sc);const c=document.createElement('canvas');c.width=W;c.height=H;const g=c.getContext('2d',{willReadFrequently:true});g.drawImage(img,0,0,W,H);return floodFallback(c,g,W,H);}}
function setBusy(b,txt){const el=document.getElementById('busy');if(!el)return;el.classList.toggle('show',b);if(b&&txt){const t=document.getElementById('busyTxt');if(t)t.textContent=txt;}}
const CTX_FILTER=(()=>{try{const t=document.createElement('canvas').getContext('2d');t.filter='grayscale(1)';return t.filter==='grayscale(1)';}catch(e){return false;}})();
function makeGray(src){const w=src.width,h=src.height,c=document.createElement('canvas');c.width=w;c.height=h;const g=c.getContext('2d',{willReadFrequently:!CTX_FILTER});
  if(CTX_FILTER){g.filter='grayscale(1) contrast(1.05) brightness(1.02)';g.drawImage(src,0,0);return c;}g.drawImage(src,0,0);const im=g.getImageData(0,0,w,h),d=im.data;
  for(let i=0;i<d.length;i+=4){const y=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2],v=Math.max(0,Math.min(255,((y-128)*1.05+128)*1.02));d[i]=d[i+1]=d[i+2]=v;}g.putImageData(im,0,0);return c;}
let _refreshSeq=0;
async function refreshPhoto(){if(!state.photo)return;const my=++_refreshSeq;if(state.removeBg)setBusy(true,'Removing background…');
  const onProg=(key,cur,total)=>{if(my===_refreshSeq&&total&&String(key).indexOf('fetch')===0)setBusy(true,'Downloading model (first time)… '+Math.round(cur/total*100)+'%');};
  try{const gray=makeGray(await process(state.photo,onProg));if(my!==_refreshSeq)return;state.gray=gray;}finally{if(my===_refreshSeq)setBusy(false);}}

function fitFont(g,size,text,max,weight){let s=size;g.font=`${weight} ${s}px ${FONT}`;while(g.measureText(text).width>max&&s>12){s-=1;g.font=`${weight} ${s}px ${FONT}`;}return s;}
function roundRect(g,x,y,w,h,r){r=Math.min(r,h/2,w/2);g.beginPath();g.moveTo(x+r,y);g.arcTo(x+w,y,x+w,y+h,r);g.arcTo(x+w,y+h,x,y+h,r);g.arcTo(x,y+h,x,y,r);g.arcTo(x,y,x+w,y,r);g.closePath();}
function drawTag(g,x,y,h,text,color){const fs=Math.round(h*0.44),padX=Math.round(h*0.34);
  g.font=`600 ${fs}px ${FONT}`;const label='#'+text;const tw=g.measureText(label).width;const w=padX*2+tw;
  g.fillStyle=color;roundRect(g,x,y,w,h,h/2);g.fill();
  g.fillStyle='#fff';g.textBaseline='middle';g.textAlign='left';g.font=`600 ${fs}px ${FONT}`;g.fillText(label,x+padX,y+h/2+h*0.02);g.textBaseline='alphabetic';}

function draw(g,fmt){
  const c=CFG[fmt];g.clearRect(0,0,c.w,c.h);
  if(tpl[fmt]&&tpl[fmt].complete)g.drawImage(tpl[fmt],0,0,c.w,c.h);
  const R={x:c.ph[0],y:c.ph[1],w:c.ph[2]-c.ph[0],h:c.ph[3]-c.ph[1]};
  if(state.gray&&mask[fmt]&&mask[fmt].complete){
    const src=state.gray,cut=state.removeBg||state.hasAlpha;
    if(cut){
      // subject stays IN FRONT of the Z; only the bottom is cut straight at the frame's base line
      const s0=(R.h/src.height)*1.12*state.scale,nw=src.width*s0,nh=src.height*s0;
      const dx=R.x+(R.w-nw)/2+state.px,dy=R.y+R.h-nh+state.py;
      g.save();g.beginPath();g.rect(c.popClip[0],c.popClip[1],c.popClip[2],c.popClip[3]);g.clip();
      g.shadowColor='rgba(10,16,25,.30)';g.shadowBlur=Math.round(R.w*0.03);g.shadowOffsetY=Math.round(R.w*0.018);
      g.drawImage(src,dx,dy,nw,nh);g.restore();
    }else{
      const s0=Math.max(R.w/src.width,R.h/src.height)*state.scale,nw=src.width*s0,nh=src.height*s0;
      const dx=R.x+(R.w-nw)/2+state.px,dy=R.y+state.py;
      const oc=document.createElement('canvas');oc.width=c.w;oc.height=c.h;const og=oc.getContext('2d');
      og.drawImage(src,dx,dy,nw,nh);og.globalCompositeOperation='destination-in';og.drawImage(mask[fmt],0,0,c.w,c.h);g.drawImage(oc,0,0);
    }
  }else{
    const p=c.photoHint;g.fillStyle='rgba(244,251,253,.85)';g.textAlign='center';g.textBaseline='middle';g.font=`500 ${p.size}px ${FONT}`;g.fillText('Your Photo',p.x,p.y);g.textAlign='left';g.textBaseline='alphabetic';
  }
  // name / title / company
  g.fillStyle=CARDBG;g.fillRect(...c.nameCover);
  g.textBaseline='alphabetic';g.textAlign='left';
  const fn=(state.fn||'').trim()||'First Name',ln=(state.ln||'').trim()||'Last Name';
  const n=c.name,ns=Math.min(fitFont(g,n.size,fn,n.max,700),fitFont(g,n.size,ln,n.max,700));
  g.fillStyle=BLACK;g.font=`700 ${ns}px ${FONT}`;g.fillText(fn,n.x,n.l1);g.fillText(ln,n.x,n.l2);
  const tr=(state.tr||'').trim()||'Title/Role',t=c.title,ts=fitFont(g,t.size,tr,t.max,500);
  g.fillStyle=BLUE;g.font=`500 ${ts}px ${FONT}`;g.fillText(tr,t.x,t.base);
  const co=(state.co||'').trim()||'Company',o=c.company,cs=fitFont(g,o.size,co,o.max,500);
  g.fillStyle=BLACK;g.font=`500 ${cs}px ${FONT}`;g.fillText(co,o.x,o.base);
  // hashtags (on top)
  for(let i=0;i<3;i++){const t=(state.tags[i]||'').trim();if(!t)continue;const[tx,ty,col]=c.tags[i];drawTag(g,tx,ty,c.tagH,t,col);}
}
function render(){const c=CFG[state.fmt];cv.width=c.w;cv.height=c.h;draw(ctx,state.fmt);}
function download(fmt){const c=CFG[fmt],oc=document.createElement('canvas');oc.width=c.w;oc.height=c.h;draw(oc.getContext('2d'),fmt);
  const nm=((state.ln||state.fn||'kbw2026').replace(/\s+/g,'_')),fname=`KBW2026_seeyou_${fmt}_${nm}.png`;
  oc.toBlob(async b=>{if(!b)return;const file=new File([b],fname,{type:'image/png'});
    const touch=(window.matchMedia&&matchMedia('(pointer:coarse)').matches)||/Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
    if(touch&&navigator.canShare&&navigator.canShare({files:[file]})){try{await navigator.share({files:[file],title:'See you at KBW2026'});return;}catch(e){if(e&&e.name==='AbortError')return;}}
    const a=document.createElement('a');a.download=fname;a.href=URL.createObjectURL(b);document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),1500);},'image/png');}

// required-field validation (photo, name, title, company)
let triedDownload=false;
function missing(){const m=[];
  if(!state.photo)m.push('photo');
  if(!((state.fn||'').trim()||(state.ln||'').trim()))m.push('name');
  if(!(state.tr||'').trim())m.push('title');
  if(!(state.co||'').trim())m.push('company');
  return m;}
function updateValidity(){
  const m=missing(),dl=document.getElementById('dl1'),hint=document.getElementById('reqHint');
  dl.classList.toggle('off',m.length>0);
  const nm={photo:'photo',name:'name',title:'title/role',company:'company'};
  if(m.length){hint.textContent='Add your '+m.map(x=>nm[x]).join(', ')+' to download.';hint.style.display='block';}
  else hint.style.display='none';
  if(triedDownload){
    document.getElementById('drop').classList.toggle('miss',m.indexOf('photo')>=0);
    const nmiss=m.indexOf('name')>=0;
    document.getElementById('fn').classList.toggle('miss',nmiss);
    document.getElementById('ln').classList.toggle('miss',nmiss);
    document.getElementById('tr').classList.toggle('miss',m.indexOf('title')>=0);
    document.getElementById('co').classList.toggle('miss',m.indexOf('company')>=0);
  }
}
const file=document.getElementById('file'),drop=document.getElementById('drop'),adjust=document.getElementById('adjust'),rmbg=document.getElementById('rmbg');
file.addEventListener('change',e=>loadFile(e.target.files[0]));
['dragover','dragenter'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('hot');}));
['dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove('hot');}));
drop.addEventListener('drop',e=>{if(e.dataTransfer.files[0])loadFile(e.dataTransfer.files[0]);});
function loadFile(f){if(!f)return;const r=new FileReader();r.onload=()=>{const im=new Image();im.onload=()=>{
  state.photo=im;state.scale=1;state.px=0;state.py=0;document.getElementById('zoom').value=100;document.getElementById('posx').value=0;document.getElementById('posy').value=0;
  state.hasAlpha=hasTransparency(im);state.removeBg=rmbg.checked;refreshPhoto().then(render);
  drop.classList.add('has');adjust.classList.add('show');document.getElementById('dropTitle').textContent='Photo added';document.getElementById('dropSub').textContent='Click to replace';render();updateValidity();};im.src=r.result;};r.readAsDataURL(f);}
rmbg.addEventListener('change',e=>{state.removeBg=e.target.checked;state.scale=1;state.px=0;state.py=0;document.getElementById('zoom').value=100;document.getElementById('posx').value=0;document.getElementById('posy').value=0;refreshPhoto().then(render);render();});
document.getElementById('zoom').addEventListener('input',e=>{state.scale=e.target.value/100;render();});
document.getElementById('posx').addEventListener('input',e=>{state.px=+e.target.value;render();});
document.getElementById('posy').addEventListener('input',e=>{state.py=+e.target.value;render();});
document.getElementById('reset').addEventListener('click',()=>{state.scale=1;state.px=0;state.py=0;document.getElementById('zoom').value=100;document.getElementById('posx').value=0;document.getElementById('posy').value=0;render();});
let drag=false,lx=0,ly=0;const factor=()=>cv.width/cv.getBoundingClientRect().width;
cv.addEventListener('pointerdown',e=>{if(!state.gray)return;drag=true;lx=e.clientX;ly=e.clientY;cv.setPointerCapture(e.pointerId);cv.classList.add('grabbing');});
cv.addEventListener('pointermove',e=>{if(!drag)return;const f=factor();state.px=Math.max(-700,Math.min(700,state.px+(e.clientX-lx)*f));state.py=Math.max(-700,Math.min(700,state.py+(e.clientY-ly)*f));lx=e.clientX;ly=e.clientY;document.getElementById('posx').value=state.px;document.getElementById('posy').value=state.py;render();});
cv.addEventListener('pointerup',()=>{drag=false;cv.classList.remove('grabbing');});
cv.addEventListener('pointercancel',()=>{drag=false;cv.classList.remove('grabbing');});
for(const id of ['fn','ln','tr','co'])document.getElementById(id).addEventListener('input',e=>{state[id]=e.target.value;render();updateValidity();});
for(let i=0;i<3;i++)document.getElementById('t'+i).addEventListener('input',e=>{state.tags[i]=e.target.value;render();});
document.getElementById('seg').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;[...e.currentTarget.children].forEach(x=>x.classList.remove('on'));b.classList.add('on');state.fmt=b.dataset.f;render();});
document.getElementById('dl1').addEventListener('click',()=>{
  const m=missing();
  if(m.length){triedDownload=true;updateValidity();
    const first=m[0];
    if(first==='photo')document.getElementById('drop').scrollIntoView({behavior:'smooth',block:'center'});
    else document.getElementById(first==='name'?'fn':first==='title'?'tr':'co').focus();
    return;}
  download(state.fmt);});
document.getElementById('shareX').addEventListener('click',()=>{const text="See you at KBW2026 with Upbit. 🇰🇷 Sep 29–Oct 1\n\n@kbwofficial #KBW2026 #SeeYouInSeoul #KoreaBlockchainWeek";window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(text),'_blank','noopener');});
if(document.fonts&&document.fonts.ready){document.fonts.ready.then(render);}
window.addEventListener('load',()=>setTimeout(render,120));render();updateValidity();
</script>
</body>
</html>
